<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>TrainingHub</title>
    <script>
      // GitHub Pages doesn't support SPA routing natively.
      // This 404.html catches all unknown routes and redirects
      // to index.html with the full path encoded in the URL,
      // which React Router then picks up.
      var pathSegmentsToKeep = 1; // keep "/Education_System"
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
